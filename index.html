<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="10m Fly" />
  <title>10m Fly Timer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --border:   #2a2a2a;
      --accent:   #e8ff00;
      --red:      #ff4400;
      --text:     #f0f0f0;
      --muted:    #555;
      --green:    #00ff88;
      --blue:     #00cfff;
      --orange:   #ff9f00;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      max-width: 480px; margin: 0 auto;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .app-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:3px; color:var(--accent); line-height:1; }
    .app-sub   { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:3px; }

    .tabs { display:flex; gap:3px; background:var(--surface); border-radius:10px; padding:4px; border:1px solid var(--border); }
    .tab  { background:none; border:none; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:1px; padding:8px 14px; border-radius:7px; cursor:pointer; transition:all .15s; text-transform:uppercase; white-space:nowrap; }
    .tab.on { background:var(--accent); color:#000; font-weight:700; }

    /* VIEWS */
    .view { display:none; flex-direction:column; flex:1; overflow:hidden; }
    .view.on { display:flex; }

    /* ─── TIMER ─── */
    /* Clock zone: fixed top portion, centered content */
    .clock-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;   /* spread clock + result evenly */
      padding: 20px 24px 10px;
      min-height: 0;
    }

    .clock-block {
      display: flex; flex-direction: column; align-items: center;
    }

    .state-lbl {
      font-size:11px; letter-spacing:4px; text-transform:uppercase;
      color:var(--muted); margin-bottom:10px; transition:color .2s;
    }
    .state-lbl.run  { color:var(--green); }
    .state-lbl.stop { color:var(--red); }

    .clock {
      font-family:'Bebas Neue',sans-serif;
      font-size: clamp(100px, 30vw, 140px);
      letter-spacing:-2px; line-height:1; color:var(--text); transition:color .15s;
    }
    .clock.run  { color:var(--green); }
    .clock.stop { color:var(--accent); }

    /* result — sits below clock, fills its own space */
    .result {
      display:flex; gap:0; width:100%;
      opacity:0; transform:translateY(10px); transition:all .35s;
    }
    .result.on { opacity:1; transform:translateY(0); }

    .rchip {
      flex:1; text-align:center;
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:16px 10px; margin: 0 6px;
    }
    .rchip-lbl { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    .rchip-val { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:1px; line-height:1; }
    .rchip-val.t { color:var(--text); }
    .rchip-val.m { color:var(--accent); }
    .rchip-unit { font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:2px; }
    .pr-tag {
      display:inline-block; font-size:9px; font-weight:700; letter-spacing:1.5px;
      padding:3px 8px; border-radius:5px; margin-top:6px; text-transform:uppercase;
    }
    .pr-tag.t  { background:var(--blue);   color:#000; }
    .pr-tag.m  { background:var(--orange); color:#000; }
    .pr-tag.hide { visibility:hidden; }

    /* benchmark tiers */
    .tiers {
      width:100%; opacity:0; transform:translateY(8px); transition:all .35s .1s;
    }
    .tiers.on { opacity:1; transform:translateY(0); }
    .tier-lbl { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    .tier-row {
      display:flex; align-items:center; gap:10px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:10px 14px; margin-bottom:6px;
      transition:all .2s;
    }
    .tier-row.active { border-width:2px; }
    .tier-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .tier-info { flex:1; }
    .tier-name { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
    .tier-range { font-size:10px; color:var(--muted); margin-top:1px; letter-spacing:1px; }
    .tier-you {
      font-size:10px; font-weight:700; letter-spacing:1px;
      padding:3px 8px; border-radius:6px; text-transform:uppercase; flex-shrink:0;
    }

    /* Elite sparkle shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .tier-row.elite-active {
      background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,180,0,0.06), rgba(255,215,0,0.12)) !important;
      border-color: #FFD700 !important;
    }
    .tier-name.sparkle {
      background: linear-gradient(90deg, #b8860b, #FFD700, #fffacd, #FFD700, #b8860b);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s linear infinite;
    }
    .tier-you.sparkle {
      background: linear-gradient(90deg, #b8860b, #FFD700, #fffacd, #FFD700, #b8860b) !important;
      background-size: 200% auto !important;
      animation: shimmer 2s linear infinite;
      color: #000 !important;
    }

    /* queue */
    .q-wrap { padding:0 20px 10px; flex-shrink:0; }
    .q-lbl  { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
    .q-strip {
      display:flex; gap:8px; overflow-x:auto; padding-bottom:6px;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .q-strip::-webkit-scrollbar { display:none; }
    .qchip {
      flex-shrink:0; background:var(--surface2); border:1px solid var(--border);
      border-radius:24px; padding:10px 18px; font-size:13px; cursor:pointer;
      transition:all .15s; white-space:nowrap; color:var(--muted);
    }
    .qchip.on   { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
    .qchip.done { background:var(--surface); border-color:var(--green); color:var(--green); }
    .q-none { font-size:11px; color:var(--muted); letter-spacing:1px; padding:6px 0; }

    .add-row { display:flex; gap:8px; margin-top:8px; }
    .txt-in  {
      flex:1; background:var(--surface2); border:1px solid var(--border);
      border-radius:10px; color:var(--text); font-family:'IBM Plex Mono',monospace;
      font-size:14px; padding:12px 14px; outline:none;
    }
    .txt-in:focus { border-color:var(--accent); }
    .txt-in::placeholder { color:var(--muted); }
    .plus-btn {
      background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      color:var(--accent); font-family:'Bebas Neue',sans-serif; font-size:24px;
      padding:0 18px; cursor:pointer; transition:background .15s;
    }
    .plus-btn:active { background:var(--surface3); }

    /* controls */
    .ctrl {
      padding:10px 20px 6px; display:grid; grid-template-columns:1fr 1fr; gap:12px;
      flex-shrink:0; border-top:1px solid var(--border);
      margin-bottom: env(safe-area-inset-bottom);
    }
    .btn {
      border:none; border-radius:14px; font-family:'Bebas Neue',sans-serif;
      font-size:26px; letter-spacing:2px; cursor:pointer; padding:22px 10px;
      transition:all .1s; -webkit-user-select:none; user-select:none;
    }
    .btn:active { transform:scale(.96); }
    .btn-go   { background:var(--green); color:#000; grid-column:1/-1; }
    .btn-stop { background:var(--red);   color:#fff; grid-column:1/-1; }
    .btn-rst  { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
    .btn-save { background:var(--accent); color:#000; }
    .btn:disabled { opacity:.3; pointer-events:none; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(0,255,136,.3)}70%{box-shadow:0 0 0 20px rgba(0,255,136,0)}100%{box-shadow:0 0 0 0 rgba(0,255,136,0)} }
    .pulsing { animation:pulse 1.2s infinite; }

    /* ─── ROSTER ─── */
    .r-head { padding:16px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .r-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:var(--muted); margin-bottom:10px; }
    .r-list  { flex:1; overflow-y:auto; padding:12px 20px; -webkit-overflow-scrolling:touch; }

    .r-card {
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:16px 18px; margin-bottom:10px;
      display:grid; grid-template-columns:1fr auto; gap:4px 12px;
      animation:ci .2s ease;
    }
    @keyframes ci { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

    .r-name { font-size:17px; font-weight:600; color:var(--text); }
    .r-prs  { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
    .r-pill { font-size:11px; letter-spacing:1px; padding:4px 10px; border-radius:12px; font-weight:600; }
    .r-pill.t { background:rgba(0,207,255,.15); color:var(--blue);   border:1px solid rgba(0,207,255,.3); }
    .r-pill.m { background:rgba(255,159,0,.15); color:var(--orange); border:1px solid rgba(255,159,0,.3); }
    .r-pill.n { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
    .r-runs { font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
    .r-del  { background:none; border:none; color:var(--border); font-size:20px; cursor:pointer; padding:6px; transition:color .15s; align-self:start; }
    .r-del:hover { color:var(--red); }
    .r-empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:12px; letter-spacing:2px; text-transform:uppercase; }

    /* ─── LOG ─── */
    .l-head { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
    .l-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:var(--muted); }
    .clr-btn { background:none; border:1px solid var(--border); color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:1px; padding:8px 14px; border-radius:8px; cursor:pointer; text-transform:uppercase; transition:all .15s; }
    .clr-btn:hover { border-color:var(--red); color:var(--red); }

    .l-list { flex:1; overflow-y:auto; padding:12px 20px; -webkit-overflow-scrolling:touch; }
    .l-list::-webkit-scrollbar { width:3px; }
    .l-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    .l-card {
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:16px 16px; margin-bottom:10px;
      display:grid; grid-template-columns:1fr auto; gap:4px 14px; align-items:center;
      animation:ci .2s ease;
    }
    .l-card.pt { border-color:rgba(0,207,255,.4); }
    .l-card.pm { border-color:rgba(255,159,0,.4); }
    .l-card.pb { border-color:rgba(232,255,0,.5); }

    .l-name   { font-size:15px; font-weight:600; color:var(--text); }
    .l-meta   { font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:2px; }
    .l-badges { display:flex; gap:5px; margin-top:5px; }
    .l-time   { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--accent); letter-spacing:1px; line-height:1; text-align:right; }
    .l-mph    { font-size:13px; color:var(--green); font-weight:600; text-align:right; letter-spacing:1px; margin-top:2px; }
    .l-del    { background:none; border:none; color:var(--border); font-size:16px; cursor:pointer; padding:4px; transition:color .15s; }
    .l-del:hover { color:var(--red); }

    .l-empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .l-empty-ico { font-size:50px; margin-bottom:12px; opacity:.3; }
    .l-empty-txt { font-size:11px; letter-spacing:2px; text-transform:uppercase; }

    /* stats bar */
    .stats {
      padding:12px 20px; border-top:1px solid var(--border);
      display:grid; grid-template-columns:repeat(3,1fr); gap:8px; flex-shrink:0;
      padding-bottom:calc(12px + env(safe-area-inset-bottom));
    }
    .sitem { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 10px; text-align:center; }
    .slbl  { font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
    .sval  { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--accent); letter-spacing:1px; line-height:1; }

    /* toast */
    #toast {
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(10px);
      background:var(--surface2); border:1px solid var(--border); color:var(--text);
      font-size:13px; letter-spacing:1px; padding:12px 22px; border-radius:24px;
      opacity:0; transition:all .25s; pointer-events:none; white-space:nowrap; z-index:999;
    }
    #toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
    #toast.pr { border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div>
      <div class="app-title">10m FLY</div>
      <div class="app-sub">Feed The Cats · Speed Timer</div>
    </div>
    <div class="tabs">
      <button class="tab on"  data-view="timer-view">Timer</button>
      <button class="tab"     data-view="roster-view">Roster</button>
      <button class="tab"     data-view="log-view">Log</button>
    </div>
  </header>

  <!-- ══ TIMER ══ -->
  <div id="timer-view" class="view on">

    <div class="clock-wrap">
      <div class="clock-block">
        <div class="state-lbl" id="slbl">READY</div>
        <div class="clock" id="clock">0.000</div>
      </div>

      <div class="result" id="result">
        <div class="rchip">
          <div class="rchip-lbl">Time</div>
          <div class="rchip-val t" id="res-t">—</div>
          <div class="rchip-unit">seconds</div>
          <div class="pr-tag t hide" id="pr-t">PR TIME ⚡</div>
        </div>
        <div class="rchip">
          <div class="rchip-lbl">Top Speed</div>
          <div class="rchip-val m" id="res-m">—</div>
          <div class="rchip-unit">mph</div>
          <div class="pr-tag m hide" id="pr-m">PR MPH 🔥</div>
        </div>
      </div>

      <!-- benchmark tiers -->
      <div class="tiers" id="tiers">
        <div class="tier-lbl">Speed Tier</div>
      </div>
    </div>

    <div class="q-wrap">
      <div class="q-lbl">Athlete — tap to select</div>
      <div class="q-strip" id="q-strip"></div>
      <div class="add-row">
        <input class="txt-in" id="q-input" type="text" placeholder="Add athlete name…" autocomplete="off" />
        <button class="plus-btn" id="q-plus">+</button>
      </div>
    </div>

    <div class="ctrl">
      <button class="btn btn-go"  id="main-btn">START</button>
      <button class="btn btn-rst" id="rst-btn"  disabled>RESET</button>
      <button class="btn btn-save" id="save-btn" disabled>SAVE RUN</button>
    </div>
  </div>

  <!-- ══ ROSTER ══ -->
  <div id="roster-view" class="view">
    <div class="r-head">
      <div class="r-title">Athlete Roster</div>
      <div class="add-row">
        <input class="txt-in" id="r-input" type="text" placeholder="Athlete name…" autocomplete="off" />
        <button class="plus-btn" id="r-plus">+</button>
      </div>
    </div>
    <div class="r-list" id="r-list"></div>
  </div>

  <!-- ══ LOG ══ -->
  <div id="log-view" class="view">
    <div class="l-head">
      <div class="l-title">Session Log</div>
      <button class="clr-btn" id="clr-btn">CLEAR ALL</button>
    </div>
    <div class="l-list" id="l-list"></div>
    <div class="stats">
      <div class="sitem"><div class="slbl">Runs</div><div class="sval" id="s-runs">0</div></div>
      <div class="sitem"><div class="slbl">Best Time</div><div class="sval" id="s-best">—</div></div>
      <div class="sitem"><div class="slbl">Top MPH</div><div class="sval" id="s-mph">—</div></div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════
//  STORE
// ══════════════════════════════════════
let roster  = [];
let history = [];
let activeId = null;

function load() {
  try { roster  = JSON.parse(localStorage.getItem('fly_roster')  || '[]'); } catch(e){ roster=[]; }
  try { history = JSON.parse(localStorage.getItem('fly_history') || '[]'); } catch(e){ history=[]; }
}
function persist() {
  try { localStorage.setItem('fly_roster',  JSON.stringify(roster));  } catch(e){}
  try { localStorage.setItem('fly_history', JSON.stringify(history)); } catch(e){}
}
load();

// ══════════════════════════════════════
//  TIMER
// ══════════════════════════════════════
let state = 'idle'; // idle | running | stopped
let t0    = null;
let ms    = 0;
let raf   = null;

const $clock   = document.getElementById('clock');
const $slbl    = document.getElementById('slbl');
const $result  = document.getElementById('result');
const $resT    = document.getElementById('res-t');
const $resM    = document.getElementById('res-m');
const $prT     = document.getElementById('pr-t');
const $prM     = document.getElementById('pr-m');
const $mainBtn = document.getElementById('main-btn');
const $rstBtn  = document.getElementById('rst-btn');
const $saveBtn = document.getElementById('save-btn');

function fmt(n) { return Math.floor(n/1000)+'.'+String(n%1000).padStart(3,'0'); }
function mph(n) { return (22.37/(n/1000)).toFixed(2); }

function tick() {
  ms = Date.now() - t0;
  $clock.textContent = fmt(ms);
  raf = requestAnimationFrame(tick);
}

function doStart() {
  state = 'running';
  t0 = Date.now() - ms;
  raf = requestAnimationFrame(tick);
  $clock.className   = 'clock run';
  $slbl.textContent  = activeId ? nameOf(activeId).toUpperCase() + ' — GO' : 'RUNNING';
  $slbl.className    = 'state-lbl run';
  $mainBtn.textContent = 'STOP';
  $mainBtn.className = 'btn btn-stop pulsing';
  $rstBtn.disabled   = true;
  $saveBtn.disabled  = true;
  $result.classList.remove('on');
  document.getElementById('tiers').classList.remove('on');
}

function doStop() {
  if (state !== 'running') return;
  state = 'stopped';
  cancelAnimationFrame(raf);
  ms = Date.now() - t0;
  $clock.textContent = fmt(ms);
  $clock.className   = 'clock stop';

  const speed = mph(ms);
  $resT.textContent = fmt(ms);
  $resM.textContent = speed;

  const pr = checkPR(activeId, ms, parseFloat(speed));
  $prT.className = 'pr-tag t' + (pr.time ? '' : ' hide');
  $prM.className = 'pr-tag m' + (pr.mph  ? '' : ' hide');
  $result.classList.add('on');
  renderTier(ms);

  $slbl.textContent = 'STOPPED';
  $slbl.className   = 'state-lbl stop';
  $mainBtn.textContent = 'NEXT RUN';
  $mainBtn.className   = 'btn btn-go';
  $rstBtn.disabled     = false;
  $saveBtn.disabled    = false;
  vibrate([60]);
}

function doReset() {
  state = 'idle'; ms = 0;
  cancelAnimationFrame(raf);
  $clock.textContent = '0.000';
  $clock.className   = 'clock';
  $slbl.textContent  = activeId ? nameOf(activeId).toUpperCase() : 'READY';
  $slbl.className    = 'state-lbl';
  $mainBtn.textContent = 'START';
  $mainBtn.className   = 'btn btn-go';
  $rstBtn.disabled     = true;
  $saveBtn.disabled    = true;
  $result.classList.remove('on');
}

// ══════════════════════════════════════
//  BENCHMARKS
// ══════════════════════════════════════
const TIERS = [
  { name:'Elite',      range:'< 1.00s  ·  22+ mph',       min:0,    max:1.00, color:'#FFD700', bg:'rgba(255,215,0,0.10)',   sparkle:true  },
  { name:'Target',     range:'1.00–1.25s  ·  18–22 mph',  min:1.00, max:1.26, color:'#00cfff', bg:'rgba(0,207,255,0.08)',   sparkle:false },
  { name:'Emerging',   range:'1.26–1.35s  ·  16–18 mph',  min:1.26, max:1.36, color:'#00ff88', bg:'rgba(0,255,136,0.08)',   sparkle:false },
  { name:'Developing', range:'1.36–1.54s  ·  14–16 mph',  min:1.36, max:1.55, color:'#e8ff00', bg:'rgba(232,255,0,0.08)',   sparkle:false },
  { name:'Beginner',   range:'1.55s or slower',            min:1.55, max:9.99, color:'#666666', bg:'rgba(100,100,100,0.06)', sparkle:false },
];

function renderTier(timeMs) {
  const secs = timeMs / 1000;
  const el   = document.getElementById('tiers');
  const tier = TIERS.find(t => secs >= t.min && secs < t.max) || TIERS[TIERS.length-1];

  el.innerHTML = '<div class="tier-lbl">Speed Tier</div>' +
    TIERS.map(t => {
      const active  = t === tier;
      const isElite = t.sparkle && active;
      const rowCls  = 'tier-row' + (active ? (isElite ? ' active elite-active' : ' active') : '');
      const style   = active && !isElite ? `border-color:${t.color}; background:${t.bg};` : '';
      const nameCls = 'tier-name' + (isElite ? ' sparkle' : '');
      const nameStyle = isElite ? '' : `color:${active ? t.color : 'var(--muted)'}`;
      const youCls  = 'tier-you' + (isElite ? ' sparkle' : '');
      const youStyle = isElite ? '' : `background:${t.color};color:#000`;
      return `<div class="${rowCls}" style="${style}">
        <div class="tier-dot" style="background:${t.color}"></div>
        <div class="tier-info">
          <div class="${nameCls}" style="${nameStyle}">${t.name}</div>
          <div class="tier-range">${t.range}</div>
        </div>
        ${active ? `<div class="${youCls}" style="${youStyle}">◀ YOU</div>` : ''}
      </div>`;
    }).join('');

  el.classList.add('on');
}

function doSave() {
  if (state !== 'stopped') return;
  const name  = activeId ? nameOf(activeId) : 'Athlete';
  const speed = parseFloat(mph(ms));
  const pr    = checkPR(activeId, ms, speed);

  const entry = {
    id: Date.now(), athleteId: activeId||null, name,
    timeMs: ms, mph: speed.toFixed(2),
    isPrTime: pr.time, isPrMph: pr.mph,
    timestamp: new Date().toISOString()
  };
  history.unshift(entry);

  if (activeId) {
    const a = roster.find(r=>r.id===activeId);
    if (a) {
      if (!a.prTime || ms < a.prTime) a.prTime = ms;
      if (!a.prMph  || speed > parseFloat(a.prMph)) a.prMph = speed.toFixed(2);
      a.runs = (a.runs||0)+1;
    }
  }
  persist();

  // mark chip done, auto-advance
  const chip = document.querySelector(`.qchip[data-id="${activeId}"]`);
  if (chip) { chip.classList.remove('on'); chip.classList.add('done'); }
  advanceQueue();

  if (pr.time && pr.mph) toast('🏆 PR — Time & MPH!', true);
  else if (pr.time)      toast('⚡ PR — Best Time!', true);
  else if (pr.mph)       toast('🔥 PR — Top Speed!', true);
  else                   toast('Saved ✓');

  vibrate([40,30,80]);
  doReset();
}

$mainBtn.addEventListener('click', () => {
  if (state==='idle')    doStart();
  else if (state==='running') doStop();
  else                   { doReset(); doStart(); }
});
$rstBtn.addEventListener('click',  doReset);
$saveBtn.addEventListener('click', doSave);

// ══════════════════════════════════════
//  PR CHECK
// ══════════════════════════════════════
function checkPR(id, timeMs, speed) {
  if (!id) return { time:false, mph:false };
  const a = roster.find(r=>r.id===id);
  if (!a) return { time:false, mph:false };
  if (!a.prTime && !a.prMph) return { time:true, mph:true }; // first run
  return {
    time: a.prTime ? timeMs < a.prTime : true,
    mph:  a.prMph  ? speed > parseFloat(a.prMph) : true
  };
}

// ══════════════════════════════════════
//  QUEUE
// ══════════════════════════════════════
function nameOf(id) {
  const a = roster.find(r=>r.id===id);
  return a ? a.name : 'Athlete';
}

function renderQueue() {
  const strip = document.getElementById('q-strip');
  if (!roster.length) {
    strip.innerHTML = '<div class="q-none">No athletes — add below or in Roster tab</div>';
    return;
  }
  strip.innerHTML = roster.map(a => {
    const cls = a.id===activeId ? 'qchip on' : 'qchip';
    return `<div class="${cls}" data-id="${a.id}">${esc(a.name)}</div>`;
  }).join('');
  strip.querySelectorAll('.qchip').forEach(c => {
    c.addEventListener('click', () => selectAthlete(parseInt(c.dataset.id)));
  });
}

function selectAthlete(id) {
  activeId = (activeId===id) ? null : id;
  renderQueue();
  if (state==='idle') $slbl.textContent = activeId ? nameOf(activeId).toUpperCase() : 'READY';
}

function advanceQueue() {
  if (!activeId) return;
  const idx  = roster.findIndex(r=>r.id===activeId);
  const next = roster[idx+1];
  activeId   = next ? next.id : null;
  renderQueue();
}

function addAthlete(name) {
  name = name.trim();
  if (!name) return;
  if (roster.find(r=>r.name.toLowerCase()===name.toLowerCase())) { toast('Already on roster'); return; }
  roster.push({ id:Date.now(), name, prTime:null, prMph:null, runs:0 });
  persist();
  renderQueue();
  renderRoster();
}

// queue add
document.getElementById('q-plus').addEventListener('click', () => {
  const inp = document.getElementById('q-input');
  addAthlete(inp.value); inp.value='';
});
document.getElementById('q-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const inp=e.target; addAthlete(inp.value); inp.value=''; }
});

// roster add
document.getElementById('r-plus').addEventListener('click', () => {
  const inp = document.getElementById('r-input');
  addAthlete(inp.value); inp.value='';
});
document.getElementById('r-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const inp=e.target; addAthlete(inp.value); inp.value=''; }
});

function removeAthlete(id) {
  const a = roster.find(r=>r.id===id);
  if (!a) return;
  if (!confirm('Remove ' + a.name + ' from the roster?\n\nTheir run log entries will stay, but their PRs will be lost.')) return;
  roster = roster.filter(r=>r.id!==id);
  if (activeId===id) activeId=null;
  persist(); renderQueue(); renderRoster();
}

// ══════════════════════════════════════
//  ROSTER RENDER
// ══════════════════════════════════════
function renderRoster() {
  const el = document.getElementById('r-list');
  if (!roster.length) { el.innerHTML='<div class="r-empty">No athletes yet — add above</div>'; return; }
  el.innerHTML = roster.map(a => {
    const runs = a.runs||0;
    const pills = [];
    if (a.prTime) pills.push(`<span class="r-pill t">⚡ ${fmt(a.prTime)}s</span>`);
    if (a.prMph)  pills.push(`<span class="r-pill m">🔥 ${a.prMph} mph</span>`);
    if (!a.prTime && !a.prMph) pills.push('<span class="r-pill n">No runs yet</span>');
    return `
      <div class="r-card">
        <div>
          <div class="r-name">${esc(a.name)}</div>
          <div class="r-prs">${pills.join('')}</div>
          <div class="r-runs">${runs} run${runs!==1?'s':''}</div>
        </div>
        <button class="r-del" data-id="${a.id}">✕</button>
      </div>`;
  }).join('');
  el.querySelectorAll('.r-del').forEach(b=>{
    b.addEventListener('click', ()=>removeAthlete(parseInt(b.dataset.id)));
  });
}

// ══════════════════════════════════════
//  LOG RENDER
// ══════════════════════════════════════
function renderLog() {
  const el = document.getElementById('l-list');
  if (!history.length) {
    el.innerHTML=`<div class="l-empty"><div class="l-empty-ico">⚡</div><div class="l-empty-txt">No runs logged yet</div></div>`;
    updateStats(); return;
  }
  el.innerHTML = history.map(e=>{
    const both = e.isPrTime && e.isPrMph;
    const cls  = both?'l-card pb':e.isPrTime?'l-card pt':e.isPrMph?'l-card pm':'l-card';
    const tags = [];
    if (e.isPrTime) tags.push('<span class="pr-tag t">PR TIME ⚡</span>');
    if (e.isPrMph)  tags.push('<span class="pr-tag m">PR MPH 🔥</span>');
    return `
      <div class="${cls}">
        <div>
          <div class="l-name">${esc(e.name)}</div>
          <div class="l-meta">${fmtDate(e.timestamp)}</div>
          ${tags.length?`<div class="l-badges">${tags.join('')}</div>`:''}
        </div>
        <div>
          <div class="l-time">${fmt(e.timeMs)}s</div>
          <div class="l-mph">${e.mph} mph</div>
        </div>
        <button class="l-del" data-id="${e.id}">✕</button>
      </div>`;
  }).join('');
  el.querySelectorAll('.l-del').forEach(b=>{
    b.addEventListener('click', ()=>{
    const entry = history.find(x=>x.id===parseInt(b.dataset.id));
    const label = entry ? entry.name + ' — ' + fmt(entry.timeMs) + 's' : 'this run';
    if (!confirm('Delete ' + label + '?')) return;
    history = history.filter(x=>x.id!==parseInt(b.dataset.id));
    persist(); renderLog();
  });
  });
  updateStats();
}

function updateStats() {
  document.getElementById('s-runs').textContent = history.length;
  if (!history.length) { document.getElementById('s-best').textContent=document.getElementById('s-mph').textContent='—'; return; }
  document.getElementById('s-best').textContent = fmt(Math.min(...history.map(e=>e.timeMs)));
  document.getElementById('s-mph').textContent  = Math.max(...history.map(e=>parseFloat(e.mph))).toFixed(1);
}

document.getElementById('clr-btn').addEventListener('click', ()=>{
  if (!history.length) return;
  if (confirm('Clear all run logs? (Roster PRs are kept)')) { history=[]; persist(); renderLog(); }
});

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const id = btn.dataset.view;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    btn.classList.add('on');
    if (id==='roster-view') renderRoster();
    if (id==='log-view')    renderLog();
  });
});

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
function fmtDate(iso) {
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+
         d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function vibrate(p){ try{ navigator.vibrate&&navigator.vibrate(p); }catch(e){} }

let toastTimer;
function toast(msg, pr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'on'+(pr?' pr':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className=''; }, 2400);
}

// ══════════════════════════════════════
//  SW + INIT
// ══════════════════════════════════════
if ('serviceWorker' in navigator)
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

renderQueue();
updateStats();
</script>
