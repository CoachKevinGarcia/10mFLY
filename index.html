<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="10m Fly" />
  <title>10m Fly Timer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --border:   #2a2a2a;
      --accent:   #e8ff00;
      --red:      #ff4400;
      --text:     #f0f0f0;
      --muted:    #aaa;
      --green:    #00ff88;
      --blue:     #00cfff;
      --orange:   #ff9f00;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      max-width: 480px; margin: 0 auto;
      position: relative; overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 10px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; position: relative; z-index: 10;
      background: var(--bg);
    }
    .app-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; color:var(--accent); line-height:1; }
    .app-sub   { font-size:8px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:2px; }
    .tabs { display:flex; gap:3px; background:var(--surface); border-radius:10px; padding:4px; border:1px solid var(--border); }
    .tab  { background:none; border:none; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:1px; padding:7px 12px; border-radius:7px; cursor:pointer; transition:all .15s; text-transform:uppercase; white-space:nowrap; }
    .tab.on { background:var(--accent); color:#000; font-weight:700; }

    /* ── SCREEN SYSTEM ──
       Three screens live in a sliding container.
       Timer (index 0) → Results (index 1)
       translate(-100%) = timer visible
       translate(0%)    = results visible
    */
    .screen-wrap {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
      position: relative;
    }

    /* Tab views (Timer / Roster / Log) */
    .view { display:none; flex-direction:column; flex:1; overflow:hidden; min-height:0; }
    .view.on { display:flex; }

    /* ── TIMER SCREEN ── */
    #timer-view { position: relative; }

    /* The sliding panel that holds timer + results side by side */
    .slide-track {
      display: flex; width: 200%; height: 100%;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .slide-track.show-results { transform: translateX(-50%); }

    .slide-panel {
      width: 50%; height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── TIMER PANEL ── */
    .timer-panel {
      flex: 1; display: flex; flex-direction: column;
    }

    .clock-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 24px;
      gap: 8px;
    }

    .state-lbl {
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--muted); transition: color .2s;
    }
    .state-lbl.run  { color: var(--green); }

    .clock {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 28vw, 130px);
      letter-spacing: -2px; line-height: 1;
      color: var(--text); transition: color .15s;
    }
    .clock.run { color: var(--green); }

    .clock-sub {
      font-size: 11px; letter-spacing: 3px; color: var(--muted);
      text-transform: uppercase; margin-top: 4px;
    }

    /* Queue */
    .q-wrap { padding: 0 20px 10px; flex-shrink: 0; }
    .q-lbl  { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .q-strip {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .q-strip::-webkit-scrollbar { display: none; }
    .qchip {
      flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 24px; padding: 10px 18px; font-size: 13px; cursor: pointer;
      transition: all .15s; white-space: nowrap; color: var(--muted);
    }
    .qchip.on   { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .qchip.done { background: var(--surface); border-color: var(--green); color: var(--green); }
    .q-none { font-size: 11px; color: var(--muted); letter-spacing: 1px; padding: 4px 0; }

    .add-row { display: flex; gap: 8px; margin-top: 8px; }
    .txt-in {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
      font-size: 14px; padding: 12px 14px; outline: none;
    }
    .txt-in:focus { border-color: var(--accent); }
    .txt-in::placeholder { color: var(--muted); }
    .plus-btn {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 24px;
      padding: 0 18px; cursor: pointer; transition: background .15s;
    }
    .plus-btn:active { background: var(--surface3); }

    /* Timer buttons */
    .timer-ctrl {
      padding: 10px 20px 6px; flex-shrink: 0;
      border-top: 1px solid var(--border);
      margin-bottom: env(safe-area-inset-bottom);
    }
    .btn {
      border: none; border-radius: 14px; font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px; cursor: pointer;
      transition: all .1s; -webkit-user-select: none; user-select: none;
      width: 100%; padding: 22px 10px; display: block;
    }
    .btn:active { transform: scale(.97); }
    .btn-start { background: var(--green);   color: #000; }
    .btn-stop  { background: var(--red);     color: #fff; }
    .btn-save  { background: var(--accent);  color: #000; }
    .btn-new   { background: var(--green);   color: #000; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn:disabled { opacity: .3; pointer-events: none; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(255,68,0,.4); }
      70%  { box-shadow: 0 0 0 18px rgba(255,68,0,0);  }
      100% { box-shadow: 0 0 0 0   rgba(255,68,0,0);   }
    }
    .btn-stop.pulsing { animation: pulse 1.2s infinite; }

    /* ── RESULTS PANEL ── */
    .results-panel {
      display: flex; flex-direction: column;
      background: var(--bg);
    }

    .res-header {
      padding: 20px 24px 0;
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0;
    }
    .res-athlete {
      font-size: 11px; letter-spacing: 3px; color: var(--muted);
      text-transform: uppercase; margin-bottom: 4px;
    }
    .res-athlete span { color: var(--accent); }

    /* Big numbers */
    .res-numbers {
      display: flex; gap: 0; width: 100%; padding: 0 20px;
      margin-top: 16px; flex-shrink: 0;
    }
    .res-chip {
      flex: 1; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 10px; margin: 0 5px;
    }
    .res-chip-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .res-chip-val { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 1px; line-height: 1; }
    .res-chip-val.t { color: var(--text); }
    .res-chip-val.m { color: var(--accent); }
    .res-chip-unit { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }

    /* PR badges */
    .res-prs {
      display: flex; gap: 8px; justify-content: center;
      padding: 10px 20px 0; flex-shrink: 0; min-height: 30px;
    }
    .pr-tag {
      display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      padding: 4px 10px; border-radius: 6px; text-transform: uppercase;
    }
    .pr-tag.t { background: var(--blue);   color: #000; }
    .pr-tag.m { background: var(--orange); color: #000; }

    /* Tier list */
    .res-tiers {
      flex: 1; overflow-y: auto; padding: 14px 20px 0;
      -webkit-overflow-scrolling: touch;
    }
    .tier-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .tier-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
      transition: all .2s;
    }
    .tier-row.active { border-width: 2px; }
    .tier-dot  { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .tier-info { flex: 1; }
    .tier-name  { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .tier-range { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }
    .tier-you {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 6px; text-transform: uppercase; flex-shrink: 0;
    }

    /* Elite shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .tier-row.elite-active {
      background: linear-gradient(135deg, rgba(255,215,0,.12), rgba(255,180,0,.06), rgba(255,215,0,.12)) !important;
      border-color: #FFD700 !important;
    }
    .tier-name.sparkle {
      background: linear-gradient(90deg, #b8860b, #FFD700, #fffacd, #FFD700, #b8860b);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shimmer 2s linear infinite;
    }
    .tier-you.sparkle {
      background: linear-gradient(90deg, #b8860b, #FFD700, #fffacd, #FFD700, #b8860b) !important;
      background-size: 200% auto !important;
      animation: shimmer 2s linear infinite; color: #000 !important;
    }

    /* Results buttons */
    .res-ctrl {
      padding: 12px 20px 6px; flex-shrink: 0;
      border-top: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: env(safe-area-inset-bottom);
    }
    .res-ctrl .btn { font-size: 22px; padding: 20px 10px; }

    /* ── ROSTER ── */
    .r-head  { padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .r-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
    .r-list  { flex: 1; overflow-y: auto; padding: 10px 20px; }
    .r-card  {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 8px;
      display: grid; grid-template-columns: 1fr auto; gap: 3px 10px;
    }
    .r-name  { font-size: 15px; font-weight: 600; color: var(--text); }
    .r-runcount { font-size: 12px; font-weight: 400; color: var(--muted); letter-spacing: 0; }
    .r-prs   { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
    .r-pill  { font-size: 10px; letter-spacing: 1px; padding: 3px 9px; border-radius: 12px; font-weight: 600; }
    .r-pill.t { background: rgba(0,207,255,.15); color: var(--blue);   border: 1px solid rgba(0,207,255,.3); }
    .r-pill.m { background: rgba(255,159,0,.15); color: var(--orange); border: 1px solid rgba(255,159,0,.3); }
    .r-pill.n { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .r-pill.f { background: rgba(0,255,136,.15); color: var(--green); border: 1px solid rgba(0,255,136,.3); }
    .r-pill.c { background: rgba(240,240,240,.08); color: var(--text); border: 1px solid rgba(240,240,240,.15); }
    .r-runs  { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }
    .r-del   { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px; transition: color .15s; align-self: start; opacity: .6; }
    .r-del:hover { opacity: 1; }
    .r-empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── ATHLETE DRAWER ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .drawer-overlay.on { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 480px;
      background: var(--surface); border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      z-index: 101; transition: transform .35s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
      max-height: 80dvh;
    }
    .drawer.on { transform: translateX(-50%) translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 12px auto 0;
      flex-shrink: 0;
    }
    .drawer-header {
      padding: 14px 20px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .drawer-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--text); }
    .drawer-close {
      background: none; border: none; color: var(--muted); font-size: 22px;
      cursor: pointer; padding: 4px; line-height: 1;
    }
    .drawer-prs {
      display: flex; gap: 8px; padding: 10px 20px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
    }
    .drawer-section-lbl {
      font-size: 9px; letter-spacing: 2px; color: var(--muted);
      text-transform: uppercase; padding: 10px 20px 6px; flex-shrink: 0;
    }
    .drawer-runs { overflow-y: auto; flex: 1; padding: 0 20px 20px; }

    .drun-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .drun-row:last-child { border-bottom: none; }
    .drun-num { font-size: 10px; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0; }
    .drun-time { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--accent); letter-spacing: 1px; line-height: 1; }
    .drun-mph  { font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 1px; }
    .drun-date { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 1px; }
    .drun-tags { display: flex; gap: 4px; margin-top: 3px; }
    .drun-pr   { font-size: 8px; font-weight: 700; letter-spacing: 1px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    .drun-pr.t { background: var(--blue);   color: #000; }
    .drun-pr.m { background: var(--orange); color: #000; }
    .drawer-empty { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

    /* make roster cards look tappable */
    .r-card { cursor: pointer; transition: background .15s; }
    .r-card:active { background: var(--surface2); }

    /* ── LOG ── */
    .l-head  { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .l-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: var(--muted); }
    .clr-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 7px 12px; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: all .15s; }
    .clr-btn:hover { border-color: var(--red); color: var(--red); }
    .l-list  { flex: 1; overflow-y: auto; padding: 10px 20px; }
    .l-list::-webkit-scrollbar { width: 3px; }
    .l-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .l-card  {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 8px;
      display: grid; grid-template-columns: 1fr auto; gap: 3px 12px; align-items: center;
    }
    .l-card.pt { border-color: rgba(0,207,255,.4); }
    .l-card.pm { border-color: rgba(255,159,0,.4); }
    .l-card.pb { border-color: rgba(232,255,0,.5); }
    .l-name   { font-size: 14px; font-weight: 600; color: var(--text); }
    .l-meta   { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
    .l-badges { display: flex; gap: 5px; margin-top: 4px; }
    .l-time   { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); letter-spacing: 1px; line-height: 1; text-align: right; }
    .l-mph    { font-size: 12px; color: var(--green); font-weight: 600; text-align: right; letter-spacing: 1px; margin-top: 2px; }
    .l-del    { background: none; border: none; color: var(--border); font-size: 16px; cursor: pointer; padding: 4px; transition: color .15s; }
    .l-del:hover { color: var(--red); }
    .l-empty  { text-align: center; padding: 60px 20px; color: var(--muted); }
    .l-empty-ico { font-size: 48px; margin-bottom: 12px; opacity: .3; }
    .l-empty-txt { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

    .stats {
      padding: 10px 20px; border-top: 1px solid var(--border);
      display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; flex-shrink: 0;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    .sitem { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 9px 8px; text-align: center; }
    .slbl  { font-size: 8px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
    .sval  { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); letter-spacing: 1px; line-height: 1; }

    /* Toast */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-size: 12px; letter-spacing: 1px; padding: 11px 22px; border-radius: 24px;
      opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; z-index: 999;
    }
    #toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.pr { border-color: var(--accent); color: var(--accent); }

    @keyframes ci { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    .r-card, .l-card { animation: ci .2s ease; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div>
      <div class="app-title">10m FLY</div>
      <div class="app-sub">Feed The Cats · Speed Timer</div>
    </div>
    <div class="tabs">
      <button class="tab on"  data-view="timer-view">Timer</button>
      <button class="tab"     data-view="roster-view">Roster</button>
      <button class="tab"     data-view="log-view">Log</button>
    </div>
  </header>

  <div class="screen-wrap">

    <!-- ══ TIMER TAB ══ -->
    <div id="timer-view" class="view on">
      <div class="slide-track" id="slide-track">

        <!-- PANEL 1: TIMER -->
        <div class="slide-panel timer-panel">
          <div class="clock-area">
            <div class="state-lbl" id="slbl">READY</div>
            <div class="clock"     id="clock">0.000</div>
            <div class="clock-sub" id="clock-sub">TAP START WHEN ATHLETE ENTERS ZONE</div>
          </div>

          <div class="q-wrap">
            <div class="q-lbl">Athlete — tap to select</div>
            <div class="q-strip" id="q-strip"></div>
            <div class="add-row">
              <input class="txt-in" id="q-input" type="text" placeholder="Add athlete name…" autocomplete="off" />
              <button class="plus-btn" id="q-plus">+</button>
            </div>
          </div>

          <div class="timer-ctrl">
            <button class="btn btn-start" id="main-btn">START</button>
          </div>
        </div>

        <!-- PANEL 2: RESULTS -->
        <div class="slide-panel results-panel">
          <div class="res-header">
            <div class="res-athlete" id="res-athlete">—</div>
          </div>

          <div class="res-numbers">
            <div class="res-chip">
              <div class="res-chip-lbl">Time</div>
              <div class="res-chip-val t" id="res-t">—</div>
              <div class="res-chip-unit">seconds</div>
            </div>
            <div class="res-chip">
              <div class="res-chip-lbl">Top Speed</div>
              <div class="res-chip-val m" id="res-m">—</div>
              <div class="res-chip-unit">mph</div>
            </div>
          </div>

          <div class="res-prs" id="res-prs"></div>

          <div class="res-tiers" id="res-tiers">
            <div class="tier-lbl">Speed Tier</div>
          </div>

          <div class="res-ctrl">
            <button class="btn btn-ghost res-reset" id="res-reset-btn">NEW RUN</button>
            <button class="btn btn-save"            id="res-save-btn">SAVE</button>
          </div>
        </div>

      </div><!-- /slide-track -->
    </div><!-- /timer-view -->

    <!-- ══ ROSTER TAB ══ -->
    <div id="roster-view" class="view">
      <div class="r-head">
        <div class="r-title">Athlete Roster</div>
        <div class="add-row">
          <input class="txt-in" id="r-input" type="text" placeholder="Athlete name…" autocomplete="off" />
          <button class="plus-btn" id="r-plus">+</button>
        </div>
      </div>
      <div class="r-list" id="r-list"></div>
    </div>

    <!-- ══ LOG TAB ══ -->
    <div id="log-view" class="view">
      <div class="l-head">
        <div class="l-title">Session Log</div>
        <button class="clr-btn" id="clr-btn">CLEAR ALL</button>
      </div>
      <div class="l-list" id="l-list"></div>
      <div class="stats">
        <div class="sitem"><div class="slbl">Runs</div><div class="sval" id="s-runs">0</div></div>
        <div class="sitem"><div class="slbl">Best Time</div><div class="sval" id="s-best">—</div></div>
        <div class="sitem"><div class="slbl">Top MPH</div><div class="sval" id="s-mph">—</div></div>
      </div>
    </div>

  </div><!-- /screen-wrap -->
</div>

<!-- ── ATHLETE DRAWER ── -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-name" id="drawer-name">—</div>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>
  <div class="drawer-prs" id="drawer-prs"></div>
  <div class="drawer-section-lbl">Last 10 Runs</div>
  <div class="drawer-runs" id="drawer-runs"></div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════
//  DATA
// ══════════════════════════════════════
let roster   = [];
let history  = [];
let activeId = null;

function load() {
  try { roster  = JSON.parse(localStorage.getItem('fly_roster')  || '[]'); } catch(e){ roster=[]; }
  try { history = JSON.parse(localStorage.getItem('fly_history') || '[]'); } catch(e){ history=[]; }
}
function persist() {
  try { localStorage.setItem('fly_roster',  JSON.stringify(roster));  } catch(e){}
  try { localStorage.setItem('fly_history', JSON.stringify(history)); } catch(e){}
}
load();

// Backfill firstTime for athletes who were saved before this field existed
roster.forEach(a => {
  if (!a.firstTime) {
    // history is newest-first, so oldest run is last in the filtered array
    const runs = history.filter(e => e.athleteId === a.id);
    if (runs.length) a.firstTime = runs[runs.length - 1].timeMs;
  }
});
persist();

// ══════════════════════════════════════
//  TIMER
// ══════════════════════════════════════
let state = 'idle';
let t0    = null;
let ms    = 0;
let raf   = null;

const $clock    = document.getElementById('clock');
const $slbl     = document.getElementById('slbl');
const $clockSub = document.getElementById('clock-sub');
const $mainBtn  = document.getElementById('main-btn');
const $track    = document.getElementById('slide-track');

function fmt(n)  { return Math.floor(n/1000) + '.' + String(n%1000).padStart(3,'0'); }
function mph(n)  { return (22.37 / (n/1000)).toFixed(2); }

function tick() {
  ms = Date.now() - t0;
  $clock.textContent = fmt(ms);
  raf = requestAnimationFrame(tick);
}

// START
function doStart() {
  state = 'running';
  t0    = Date.now() - ms;
  raf   = requestAnimationFrame(tick);

  $clock.className    = 'clock run';
  $slbl.textContent   = activeId ? nameOf(activeId).toUpperCase() : 'RUNNING';
  $slbl.className     = 'state-lbl run';
  $clockSub.textContent = 'TAP STOP WHEN ATHLETE CLEARS ZONE';
  $mainBtn.textContent  = 'STOP';
  $mainBtn.className    = 'btn btn-stop pulsing';
}

// STOP → show results screen
function doStop() {
  if (state !== 'running') return;
  state = 'stopped';
  cancelAnimationFrame(raf);
  ms = Date.now() - t0;
  $clock.textContent = fmt(ms);

  // Populate results panel
  const speed = mph(ms);
  document.getElementById('res-t').textContent = fmt(ms);
  document.getElementById('res-m').textContent = speed;

  const athleteName = activeId ? nameOf(activeId) : null;
  const resAthlete  = document.getElementById('res-athlete');
  resAthlete.innerHTML = athleteName
    ? 'Result for <span>' + esc(athleteName) + '</span>'
    : 'Result';

  // PR badges
  const pr = checkPR(activeId, ms, parseFloat(speed));
  const prsEl = document.getElementById('res-prs');
  prsEl.innerHTML = '';
  if (pr.time) prsEl.innerHTML += '<span class="pr-tag t">PR TIME ⚡</span>';
  if (pr.mph)  prsEl.innerHTML += '<span class="pr-tag m">PR MPH 🔥</span>';

  // Tiers
  renderTiers(ms);

  // Slide to results
  $track.classList.add('show-results');
  vibrate([60]);
}

// RESET — slide back to timer
function doReset() {
  state = 'idle'; ms = 0;
  cancelAnimationFrame(raf);

  $track.classList.remove('show-results');

  // Small delay so slide completes before resetting visuals
  setTimeout(() => {
    $clock.textContent    = '0.000';
    $clock.className      = 'clock';
    $slbl.textContent     = activeId ? nameOf(activeId).toUpperCase() : 'READY';
    $slbl.className       = 'state-lbl';
    $clockSub.textContent = 'TAP START WHEN ATHLETE ENTERS ZONE';
    $mainBtn.textContent  = 'START';
    $mainBtn.className    = 'btn btn-start';
  }, 300);
}

// SAVE
function doSave() {
  const name  = activeId ? nameOf(activeId) : 'Athlete';
  const speed = parseFloat(mph(ms));
  const pr    = checkPR(activeId, ms, speed);

  const entry = {
    id: Date.now(), athleteId: activeId||null, name,
    timeMs: ms, mph: speed.toFixed(2),
    isPrTime: pr.time, isPrMph: pr.mph,
    timestamp: new Date().toISOString()
  };
  history.unshift(entry);

  if (activeId) {
    const a = roster.find(r => r.id === activeId);
    if (a) {
      if (!a.prTime || ms < a.prTime)             a.prTime = ms;
      if (!a.prMph  || speed > parseFloat(a.prMph)) a.prMph = speed.toFixed(2);
      if (!a.firstTime) a.firstTime = ms;
      a.runs = (a.runs || 0) + 1;
    }
  }
  persist();

  // Mark chip done, advance queue
  const chip = document.querySelector(`.qchip[data-id="${activeId}"]`);
  if (chip) { chip.classList.remove('on'); chip.classList.add('done'); }
  advanceQueue();

  if (pr.time && pr.mph) toast('🏆 PR — Time & MPH!', true);
  else if (pr.time)      toast('⚡ PR — Best Time!',   true);
  else if (pr.mph)       toast('🔥 PR — Top Speed!',   true);
  else                   toast('Saved ✓');

  vibrate([40, 30, 80]);
  doReset();
}

// Button wiring
$mainBtn.addEventListener('click', () => {
  if (state === 'idle')    doStart();
  else if (state === 'running') doStop();
});
document.getElementById('res-reset-btn').addEventListener('click', doReset);
document.getElementById('res-save-btn').addEventListener('click',  doSave);

// ══════════════════════════════════════
//  PR CHECK
// ══════════════════════════════════════
function checkPR(id, timeMs, speed) {
  if (!id) return { time: false, mph: false };
  const a = roster.find(r => r.id === id);
  if (!a) return { time: false, mph: false };
  if (!a.prTime && !a.prMph) return { time: true, mph: true };
  return {
    time: a.prTime ? timeMs < a.prTime : true,
    mph:  a.prMph  ? speed  > parseFloat(a.prMph) : true
  };
}

// ══════════════════════════════════════
//  BENCHMARKS
// ══════════════════════════════════════
const TIERS = [
  { name:'Elite',      range:'< 1.00s  ·  22+ mph',        min:0,    max:1.00, color:'#FFD700', bg:'rgba(255,215,0,0.10)',   sparkle:true  },
  { name:'Target',     range:'1.00 – 1.25s  ·  18–22 mph', min:1.00, max:1.26, color:'#00cfff', bg:'rgba(0,207,255,0.08)',   sparkle:false },
  { name:'Emerging',   range:'1.26 – 1.35s  ·  16–18 mph', min:1.26, max:1.36, color:'#00ff88', bg:'rgba(0,255,136,0.08)',   sparkle:false },
  { name:'Developing', range:'1.36 – 1.54s  ·  14–16 mph', min:1.36, max:1.55, color:'#e8ff00', bg:'rgba(232,255,0,0.08)',   sparkle:false },
  { name:'Beginner',   range:'1.55s or slower',             min:1.55, max:9.99, color:'#666666', bg:'rgba(100,100,100,0.06)', sparkle:false },
];

function renderTiers(timeMs) {
  const secs = timeMs / 1000;
  const el   = document.getElementById('res-tiers');
  const tier = TIERS.find(t => secs >= t.min && secs < t.max) || TIERS[TIERS.length - 1];

  el.innerHTML = '<div class="tier-lbl">Speed Tier</div>' +
    TIERS.map(t => {
      const active  = t === tier;
      const isElite = active && t.sparkle;
      const rowCls  = 'tier-row' + (active ? (isElite ? ' active elite-active' : ' active') : '');
      const rowStyle = active && !isElite ? `border-color:${t.color}; background:${t.bg};` : '';
      const nameCls  = 'tier-name' + (isElite ? ' sparkle' : '');
      const nameStyle = isElite ? '' : `color:${active ? t.color : 'var(--muted)'}`;
      const youCls   = 'tier-you' + (isElite ? ' sparkle' : '');
      const youStyle  = isElite ? '' : `background:${t.color}; color:#000`;
      return `<div class="${rowCls}" style="${rowStyle}">
        <div class="tier-dot" style="background:${t.color}"></div>
        <div class="tier-info">
          <div class="${nameCls}" style="${nameStyle}">${t.name}</div>
          <div class="tier-range">${t.range}</div>
        </div>
        ${active ? `<div class="${youCls}" style="${youStyle}">◀ YOU</div>` : ''}
      </div>`;
    }).join('');
}

// ══════════════════════════════════════
//  QUEUE
// ══════════════════════════════════════
function nameOf(id) {
  const a = roster.find(r => r.id === id);
  return a ? a.name : 'Athlete';
}

function renderQueue() {
  const strip = document.getElementById('q-strip');
  if (!roster.length) {
    strip.innerHTML = '<div class="q-none">No athletes — add below or in Roster tab</div>';
    return;
  }
  strip.innerHTML = roster.map(a => {
    const cls  = a.id === activeId ? 'qchip on' : 'qchip';
    const sub  = a.firstTime ? ` <span class="qchip-sub">🚀${fmt(a.firstTime)}s</span>` : '';
    return `<div class="${cls}" data-id="${a.id}">${esc(a.name)}${sub}</div>`;
  }).join('');
  strip.querySelectorAll('.qchip').forEach(c => {
    c.addEventListener('click', () => selectAthlete(parseInt(c.dataset.id)));
  });
}

function selectAthlete(id) {
  activeId = (activeId === id) ? null : id;
  renderQueue();
  if (state === 'idle') $slbl.textContent = activeId ? nameOf(activeId).toUpperCase() : 'READY';
}

function advanceQueue() {
  if (!activeId) return;
  const idx  = roster.findIndex(r => r.id === activeId);
  const next = roster[idx + 1];
  activeId   = next ? next.id : null;
  renderQueue();
}

function addAthlete(name) {
  name = name.trim();
  if (!name) return;
  if (roster.find(r => r.name.toLowerCase() === name.toLowerCase())) { toast('Already on roster'); return; }
  roster.push({ id: Date.now(), name, prTime: null, prMph: null, firstTime: null, runs: 0 });
  persist();
  renderQueue();
  renderRoster();
}

document.getElementById('q-plus').addEventListener('click', () => {
  const inp = document.getElementById('q-input');
  addAthlete(inp.value); inp.value = '';
});
document.getElementById('q-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addAthlete(e.target.value); e.target.value = ''; }
});
document.getElementById('r-plus').addEventListener('click', () => {
  const inp = document.getElementById('r-input');
  addAthlete(inp.value); inp.value = '';
});
document.getElementById('r-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addAthlete(e.target.value); e.target.value = ''; }
});

function removeAthlete(id) {
  const a = roster.find(r => r.id === id);
  if (!a) return;
  if (!confirm('Remove ' + a.name + ' from the roster?\n\nRun log entries stay, but their PRs will be lost.')) return;
  roster = roster.filter(r => r.id !== id);
  if (activeId === id) activeId = null;
  persist(); renderQueue(); renderRoster();
}

// ══════════════════════════════════════
//  ROSTER RENDER
// ══════════════════════════════════════
function renderRoster() {
  const el = document.getElementById('r-list');
  if (!roster.length) { el.innerHTML = '<div class="r-empty">No athletes yet — add above</div>'; return; }
  el.innerHTML = roster.map(a => {
    const runs  = a.runs || 0;
    const pills = [];
    if (a.prTime)    pills.push(`<span class="r-pill t">⚡ ${fmt(a.prTime)}s</span>`);
    if (a.prMph)     pills.push(`<span class="r-pill m">🔥 ${a.prMph} mph</span>`);
    if (a.firstTime) pills.push(`<span class="r-pill f">🚀 ${fmt(a.firstTime)}s</span>`);
    if (!a.prTime && !a.prMph && !a.firstTime) pills.push('<span class="r-pill n">No runs yet</span>');
    const runLabel = runs > 0 ? `${runs} Run${runs !== 1 ? 's' : ''}` : '';
    return `<div class="r-card" data-id="${a.id}">
      <div>
        <div class="r-name">${esc(a.name)}${runLabel ? `<span class="r-runcount"> — ${runLabel}</span>` : ''}</div>
        <div class="r-prs">${pills.join('')}</div>
      </div>
      <button class="r-del" data-id="${a.id}">✕</button>
    </div>`;
  }).join('');
  el.querySelectorAll('.r-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.r-del')) return; // don't open drawer when deleting
      openDrawer(parseInt(card.dataset.id));
    });
  });
  el.querySelectorAll('.r-del').forEach(b => {
    b.addEventListener('click', () => removeAthlete(parseInt(b.dataset.id)));
  });
}

// ══════════════════════════════════════
//  ATHLETE DRAWER
// ══════════════════════════════════════
function openDrawer(id) {
  const a = roster.find(r => r.id === id);
  if (!a) return;

  // Header name
  document.getElementById('drawer-name').textContent = a.name;

  // PR pills
  const prsEl = document.getElementById('drawer-prs');
  const pills = [];
  if (a.prTime) pills.push(`<span class="r-pill t">⚡ PR ${fmt(a.prTime)}s</span>`);
  if (a.prMph)  pills.push(`<span class="r-pill m">🔥 PR ${a.prMph} mph</span>`);
  if (!a.prTime && !a.prMph) pills.push('<span class="r-pill n">No runs yet</span>');
  prsEl.innerHTML = pills.join('');

  // Last 10 runs for this athlete
  const runs = history
    .filter(e => e.athleteId === id)
    .slice(0, 10);

  const runsEl = document.getElementById('drawer-runs');
  if (!runs.length) {
    runsEl.innerHTML = '<div class="drawer-empty">No runs logged yet</div>';
  } else {
    runsEl.innerHTML = runs.map((e, i) => {
      const tags = [];
      if (e.isPrTime) tags.push('<span class="drun-pr t">PR TIME</span>');
      if (e.isPrMph)  tags.push('<span class="drun-pr m">PR MPH</span>');
      return `<div class="drun-row">
        <div class="drun-num">${i + 1}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:baseline;gap:10px">
            <div class="drun-time">${fmt(e.timeMs)}s</div>
            <div class="drun-mph">${e.mph} mph</div>
          </div>
          <div class="drun-date">${fmtDate(e.timestamp)}</div>
          ${tags.length ? `<div class="drun-tags">${tags.join('')}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('drawer-overlay').classList.add('on');
  document.getElementById('drawer').classList.add('on');
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
}

document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

// ══════════════════════════════════════
//  LOG RENDER
// ══════════════════════════════════════
function renderLog() {
  const el = document.getElementById('l-list');
  if (!history.length) {
    el.innerHTML = `<div class="l-empty"><div class="l-empty-ico">⚡</div><div class="l-empty-txt">No runs logged yet</div></div>`;
    updateStats(); return;
  }
  el.innerHTML = history.map(e => {
    const both = e.isPrTime && e.isPrMph;
    const cls  = both ? 'l-card pb' : e.isPrTime ? 'l-card pt' : e.isPrMph ? 'l-card pm' : 'l-card';
    const tags = [];
    if (e.isPrTime) tags.push('<span class="pr-tag t">PR TIME ⚡</span>');
    if (e.isPrMph)  tags.push('<span class="pr-tag m">PR MPH 🔥</span>');
    return `<div class="${cls}">
      <div>
        <div class="l-name">${esc(e.name)}</div>
        <div class="l-meta">${fmtDate(e.timestamp)}</div>
        ${tags.length ? `<div class="l-badges">${tags.join('')}</div>` : ''}
      </div>
      <div>
        <div class="l-time">${fmt(e.timeMs)}s</div>
        <div class="l-mph">${e.mph} mph</div>
      </div>
      <button class="l-del" data-id="${e.id}">✕</button>
    </div>`;
  }).join('');
  el.querySelectorAll('.l-del').forEach(b => {
    b.addEventListener('click', () => {
      const entry = history.find(x => x.id === parseInt(b.dataset.id));
      const label = entry ? entry.name + ' — ' + fmt(entry.timeMs) + 's' : 'this run';
      if (!confirm('Delete ' + label + '?')) return;
      history = history.filter(x => x.id !== parseInt(b.dataset.id));
      persist(); renderLog();
    });
  });
  updateStats();
}

function updateStats() {
  document.getElementById('s-runs').textContent = history.length;
  if (!history.length) {
    document.getElementById('s-best').textContent = '—';
    document.getElementById('s-mph').textContent  = '—';
    return;
  }
  document.getElementById('s-best').textContent = fmt(Math.min(...history.map(e => e.timeMs)));
  document.getElementById('s-mph').textContent  = Math.max(...history.map(e => parseFloat(e.mph))).toFixed(1);
}

document.getElementById('clr-btn').addEventListener('click', () => {
  if (!history.length) return;
  if (confirm('Clear all run logs? (Roster PRs are kept)')) { history = []; persist(); renderLog(); }
});

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    btn.classList.add('on');
    if (id === 'roster-view') renderRoster();
    if (id === 'log-view')    renderLog();
  });
});

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' · ' +
         d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function vibrate(p) { try { navigator.vibrate && navigator.vibrate(p); } catch(e){} }

let toastTimer;
function toast(msg, pr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'on' + (pr ? ' pr' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2400);
}

// ══════════════════════════════════════
//  SW + INIT
// ══════════════════════════════════════
if ('serviceWorker' in navigator)
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));

renderQueue();
updateStats();
</script>
</body>
</html>
