<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="10m Fly" />
  <title>10m Fly Timer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff00;
      --accent2: #ff4400;
      --text: #f0f0f0;
      --muted: #555;
      --running: #00ff88;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .app-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--accent);
      line-height: 1;
    }

    .app-subtitle {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .tab-toggle {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-radius: 8px;
      padding: 4px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* VIEWS */
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ── TIMER VIEW ── */
    #timer-view {
      padding: 0;
      gap: 0;
    }

    .time-display-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    .state-badge {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      height: 16px;
      transition: color 0.2s;
    }

    .state-badge.running { color: var(--running); }
    .state-badge.stopped { color: var(--accent2); }

    .time-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 24vw, 110px);
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text);
      transition: color 0.15s;
      font-variant-numeric: tabular-nums;
    }

    .time-display.running { color: var(--running); }
    .time-display.stopped { color: var(--accent); }

    .time-ms {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 12vw, 56px);
      color: var(--muted);
      letter-spacing: 2px;
      line-height: 1;
      margin-top: -6px;
    }

    .time-ms.running { color: var(--running); opacity: 0.7; }
    .time-ms.stopped { color: var(--accent); opacity: 0.8; }

    /* MPH result */
    .mph-display {
      margin-top: 20px;
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
    }

    .mph-display.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .mph-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .mph-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 13vw, 60px);
      color: var(--accent);
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .mph-unit {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    /* Controls */
    .controls {
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .btn {
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      cursor: pointer;
      padding: 18px 10px;
      transition: all 0.1s;
      position: relative;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn:active { transform: scale(0.96); }

    .btn-start {
      background: var(--running);
      color: #000;
      grid-column: 1 / -1;
    }

    .btn-stop {
      background: var(--accent2);
      color: #fff;
      grid-column: 1 / -1;
    }

    .btn-reset {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-save {
      background: var(--accent);
      color: #000;
    }

    .btn:disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* Session meta */
    .session-meta {
      padding: 0 20px 10px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .meta-chip {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .meta-chip label {
      display: block;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .meta-chip input {
      background: none;
      border: none;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      width: 100%;
      outline: none;
    }

    .meta-chip input::placeholder { color: var(--muted); }

    /* ── HISTORY VIEW ── */
    #history-view {
      overflow: hidden;
    }

    .history-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .history-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      -webkit-overflow-scrolling: touch;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      align-items: center;
      animation: cardIn 0.2s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-left {}

    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .card-meta {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .card-right {
      text-align: right;
    }

    .card-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 1px;
      line-height: 1;
    }

    .card-mph {
      font-size: 11px;
      color: var(--running);
      letter-spacing: 1px;
      font-weight: 600;
    }

    .card-delete {
      background: none;
      border: none;
      color: var(--border);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      grid-column: 2;
      justify-self: end;
      transition: color 0.15s;
    }
    .card-delete:hover { color: var(--accent2); }

    /* Stats bar */
    .stats-bar {
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      flex-shrink: 0;
    }

    .stat-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 8px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: 1px;
      line-height: 1;
    }

    /* Pulse ring on running */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.25); }
      70% { box-shadow: 0 0 0 20px rgba(0,255,136,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
    }

    .btn-stop.pulsing { animation: pulse-ring 1.2s infinite; }

    /* Safe area */
    .controls { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
    .stats-bar { padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="app-title">10m FLY</div>
      <div class="app-subtitle">Feed The Cats · Speed Timer</div>
    </div>
    <div class="tab-toggle">
      <button class="tab-btn active" onclick="switchTab('timer')">Timer</button>
      <button class="tab-btn" onclick="switchTab('history')">Log</button>
    </div>
  </header>

  <!-- TIMER VIEW -->
  <div id="timer-view" class="view active">
    <div class="time-display-wrap">
      <div class="state-badge" id="state-badge">READY</div>
      <div class="time-display" id="time-display">0.000</div>
      <div class="time-ms" id="time-ms"></div>

      <div class="mph-display" id="mph-display">
        <div class="mph-label">Top Speed</div>
        <div class="mph-value" id="mph-value">—</div>
        <div class="mph-unit">MPH · 22.37 ÷ t</div>
      </div>
    </div>

    <div class="session-meta">
      <div class="meta-chip">
        <label>Athlete</label>
        <input type="text" id="athlete-name" placeholder="Name / #" autocomplete="off" />
      </div>
      <div class="meta-chip">
        <label>Notes</label>
        <input type="text" id="run-notes" placeholder="Wind, lane…" autocomplete="off" />
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="btn btn-start" id="main-btn" onclick="handleMainBtn()">START</button>
      <button class="btn btn-reset" id="reset-btn" onclick="handleReset()" disabled>RESET</button>
      <button class="btn btn-save" id="save-btn" onclick="handleSave()" disabled>SAVE RUN</button>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="history-view" class="view">
    <div class="history-header">
      <div class="history-title">Session Log</div>
      <button class="clear-btn" onclick="clearHistory()">CLEAR ALL</button>
    </div>
    <div class="history-list" id="history-list"></div>
    <div class="stats-bar" id="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Runs</div>
        <div class="stat-value" id="stat-runs">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Best Time</div>
        <div class="stat-value" id="stat-best">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Top MPH</div>
        <div class="stat-value" id="stat-mph">—</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ── State ──
  let timerState = 'idle'; // idle | running | stopped
  let startTime = null;
  let elapsed = 0;
  let rafId = null;
  let history = [];

  // ── Load history ──
  try {
    const saved = localStorage.getItem('fly10m_history');
    if (saved) history = JSON.parse(saved);
  } catch(e) {}

  // ── Helpers ──
  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const msRem = ms % 1000;
    return s + '.' + String(msRem).padStart(3, '0');
  }

  function calcMph(ms) {
    const secs = ms / 1000;
    return (22.37 / secs).toFixed(2);
  }

  function saveHistory() {
    try { localStorage.setItem('fly10m_history', JSON.stringify(history)); } catch(e) {}
  }

  function formatDateShort(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
      ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // ── Timer logic ──
  function tick() {
    if (timerState !== 'running') return;
    elapsed = Date.now() - startTime;
    updateDisplay(elapsed);
    rafId = requestAnimationFrame(tick);
  }

  function updateDisplay(ms) {
    const s = Math.floor(ms / 1000);
    const msRem = ms % 1000;
    document.getElementById('time-display').textContent = s + '.' + String(msRem).padStart(3,'0');
  }

  function handleMainBtn() {
    if (timerState === 'idle') {
      // START
      timerState = 'running';
      startTime = Date.now() - elapsed;
      rafId = requestAnimationFrame(tick);
      // UI
      document.getElementById('main-btn').textContent = 'STOP';
      document.getElementById('main-btn').className = 'btn btn-stop pulsing';
      document.getElementById('main-btn').setAttribute('onclick', 'handleStop()');
      document.getElementById('reset-btn').disabled = true;
      document.getElementById('save-btn').disabled = true;
      document.getElementById('state-badge').textContent = 'RUNNING';
      document.getElementById('state-badge').className = 'state-badge running';
      document.getElementById('time-display').className = 'time-display running';
      document.getElementById('mph-display').classList.remove('visible');
    }
  }

  function handleStop() {
    if (timerState !== 'running') return;
    timerState = 'stopped';
    cancelAnimationFrame(rafId);
    elapsed = Date.now() - startTime;
    updateDisplay(elapsed);

    // Show MPH
    const mph = calcMph(elapsed);
    document.getElementById('mph-value').textContent = mph;
    document.getElementById('mph-display').classList.add('visible');

    // UI
    document.getElementById('main-btn').textContent = 'START';
    document.getElementById('main-btn').className = 'btn btn-start';
    document.getElementById('main-btn').setAttribute('onclick', 'handleReset(); handleMainBtn();');
    document.getElementById('reset-btn').disabled = false;
    document.getElementById('save-btn').disabled = false;
    document.getElementById('state-badge').textContent = 'STOPPED · ' + formatTime(elapsed) + 's';
    document.getElementById('state-badge').className = 'state-badge stopped';
    document.getElementById('time-display').className = 'time-display stopped';

    vibrate([60]);
  }

  function handleReset() {
    timerState = 'idle';
    elapsed = 0;
    cancelAnimationFrame(rafId);
    document.getElementById('time-display').textContent = '0.000';
    document.getElementById('time-display').className = 'time-display';
    document.getElementById('state-badge').textContent = 'READY';
    document.getElementById('state-badge').className = 'state-badge';
    document.getElementById('main-btn').textContent = 'START';
    document.getElementById('main-btn').className = 'btn btn-start';
    document.getElementById('main-btn').setAttribute('onclick', 'handleMainBtn()');
    document.getElementById('reset-btn').disabled = true;
    document.getElementById('save-btn').disabled = true;
    document.getElementById('mph-display').classList.remove('visible');
  }

  function handleSave() {
    if (timerState !== 'stopped') return;
    const name = document.getElementById('athlete-name').value.trim() || 'Athlete';
    const notes = document.getElementById('run-notes').value.trim();
    const entry = {
      id: Date.now(),
      name,
      notes,
      timeMs: elapsed,
      mph: calcMph(elapsed),
      timestamp: new Date().toISOString()
    };
    history.unshift(entry);
    saveHistory();
    renderHistory();
    handleReset();
    vibrate([40, 30, 80]);
    // Flash feedback
    const btn = document.getElementById('save-btn');
    btn.textContent = 'SAVED ✓';
    setTimeout(() => { btn.textContent = 'SAVE RUN'; }, 1200);
  }

  // ── History render ──
  function renderHistory() {
    const list = document.getElementById('history-list');
    if (history.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⚡</div>
        <div class="empty-text">No runs logged yet</div>
      </div>`;
      updateStats();
      return;
    }
    list.innerHTML = history.map(e => `
      <div class="session-card">
        <div class="card-left">
          <div class="card-name">${escHtml(e.name)}</div>
          <div class="card-meta">${formatDateShort(e.timestamp)}${e.notes ? ' · ' + escHtml(e.notes) : ''}</div>
        </div>
        <div class="card-right">
          <div class="card-time">${formatTime(e.timeMs)}s</div>
          <div class="card-mph">${e.mph} mph</div>
        </div>
        <button class="card-delete" onclick="deleteEntry(${e.id})">✕</button>
      </div>
    `).join('');
    updateStats();
  }

  function deleteEntry(id) {
    history = history.filter(e => e.id !== id);
    saveHistory();
    renderHistory();
  }

  function clearHistory() {
    if (history.length === 0) return;
    if (confirm('Clear all session logs?')) {
      history = [];
      saveHistory();
      renderHistory();
    }
  }

  function updateStats() {
    document.getElementById('stat-runs').textContent = history.length;
    if (history.length === 0) {
      document.getElementById('stat-best').textContent = '—';
      document.getElementById('stat-mph').textContent = '—';
      return;
    }
    const bestTime = Math.min(...history.map(e => e.timeMs));
    const bestMph = Math.max(...history.map(e => parseFloat(e.mph)));
    document.getElementById('stat-best').textContent = formatTime(bestTime);
    document.getElementById('stat-mph').textContent = bestMph.toFixed(1);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Tab switch ──
  function switchTab(tab) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + '-view').classList.add('active');
    event.target.classList.add('active');
    if (tab === 'history') renderHistory();
  }

  // ── Haptics ──
  function vibrate(pattern) {
    try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {}
  }

  // ── SW Registration ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // ── Init ──
  renderHistory();
</script>
</body>
</html>
